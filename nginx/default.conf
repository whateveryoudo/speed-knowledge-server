limit_req_zone $binary_remote_addr zone=captcha_ip:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=auth_ip:10m rate=30r/m;


server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;


  # 开启 gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # 静态资源长缓存（带 hash 的 assets）
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }


  location / {
    try_files $uri $uri/ /index.html;
  }

  # 图形验证码：每 IP 约 20 次/分钟，允许短时突发 5 次
  location = /api/v1/auth/getVerificateCode {
    limit_req zone=captcha_ip burst=5 nodelay;
    limit_req_status 429;

    proxy_pass http://app:8010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }  

  # 登录：稍宽松，防暴力破解
  location = /api/v1/auth/login {
    limit_req zone=auth_ip burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://app:8010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }





  location /api {
    proxy_pass http://app:8010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  location /collaboration {
    proxy_pass http://nestjs:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
  }
}

