services:
  nginx:
    image: ${ACR_REGISTRY:-crpi-ewcecvhd15oyzexv.cn-chengdu.personal.cr.aliyuncs.com/speed-knowledge}/nginx-1.27-alpine:latest
    container_name: speed-knowledge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/speed-knowledge:/usr/share/nginx/html:ro
    depends_on:
      - app
      - nestjs
  db:
    image: ${ACR_REGISTRY:-crpi-ewcecvhd15oyzexv.cn-chengdu.personal.cr.aliyuncs.com/speed-knowledge}/mysql-8.4.5:latest
    container_name: speed-knowledge-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-speed-knowledge}
      # 允许 Docker 网段内服务（app 等）连接 root
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: ${ACR_REGISTRY:-crpi-ewcecvhd15oyzexv.cn-chengdu.personal.cr.aliyuncs.com/speed-knowledge}/redis-7-alpine:latest
    container_name: speed-knowledge-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio
    container_name: speed-knowledge-minio
    restart: unless-stopped
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data

  app:
    image: ${ACR_REGISTRY:-crpi-ewcecvhd15oyzexv.cn-chengdu.personal.cr.aliyuncs.com/speed-knowledge}/app:${APP_IMAGE_TAG:-latest}
    container_name: speed-knowledge-app
    restart: unless-stopped
    env_file:
      - ./python-fastapi/.env
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-change_me}@db:3306/${MYSQL_DATABASE:-speed-knowledge}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-speed-knowledge}
      NODEJS_SERVICE_URL: http://nestjs:3000
    depends_on:
      - db
      - redis
      - minio
      - rabbitmq
  rabbitmq:
    image: ${ACR_REGISTRY:-crpi-ewcecvhd15oyzexv.cn-chengdu.personal.cr.aliyuncs.com/speed-knowledge}/rabbitmq-3-management-alpine:latest
    container_name: speed-knowledge-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-app_pass}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
  nestjs:
    image: ${ACR_REGISTRY:-crpi-ewcecvhd15oyzexv.cn-chengdu.personal.cr.aliyuncs.com/speed-knowledge}/nestjs:${NESTJS_IMAGE_TAG:-latest}
    container_name: speed-knowledge-nestjs
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      DB_DATABASE: ${MYSQL_DATABASE:-speed-knowledge}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_secret}
      JWT_EXPIRES_IN: 10080s
      CORS_ORIGIN: "*"
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-app}:${RABBITMQ_DEFAULT_PASS:-app_pass}@rabbitmq:5672
      RABBITMQ_ROUTING_KEY: document.content.updated
      RABBITMQ_EXCHANGE: speed_knowledge.events
      PYTHON_SERVER_URL: http://app:8010
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change_me_internal_token}
    depends_on:
      - db
      - redis
      - rabbitmq
      - app
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: speed-knowledge-onlyoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      JWT_ENABLED: "true"
      # 与后端 `ONLYOFFICE_JWT_SECRET` 保持一致
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-change_me}
    volumes:
      - onlyoffice-data:/var/lib/onlyoffice

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  onlyoffice-data:
